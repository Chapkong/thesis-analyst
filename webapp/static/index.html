<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>논문 분석기</title>
<style>
  body { font-family:'Malgun Gothic','맑은 고딕',sans-serif; background:#f4f6f8; color:#222; margin:0; padding:40px 20px; }
  .wrap { max-width:720px; margin:0 auto; }
  h1 { color:#1a5276; font-size:1.4em; margin-bottom:.3em; }
  p.desc { color:#555; margin-bottom:1.5em; }
  #drop { border:2px dashed #1a5276; border-radius:10px; padding:40px 20px; text-align:center; background:#fff; cursor:pointer; transition:background .15s; }
  #drop.hover { background:#eef3f7; }
  #drop p { color:#1a5276; font-weight:600; }
  #drop p.sub { color:#888; font-weight:400; font-size:.85em; margin-top:.4em; }
  #fileInput { display:none; }
  #errorBox { display:none; margin-top:1em; padding:12px; background:#fdecea; border:1px solid #f5c2c0; color:#7a1f1a; border-radius:8px; }

  #queue { margin-top:1.5em; display:flex; flex-direction:column; gap:10px; }
  .item { background:#fff; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.08); padding:14px 16px; }
  .item-head { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .item-name { font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item-badge { flex-shrink:0; font-size:.78em; padding:.25em .7em; border-radius:999px; font-weight:600; }
  .item-badge.waiting { background:#eef1f3; color:#666; }
  .item-badge.processing { background:#fdf3d8; color:#8a6d1a; }
  .item-badge.done { background:#e3f3e9; color:#1c7a44; }
  .item-badge.error { background:#fdecea; color:#a02a20; }
  .item-links { margin-top:10px; display:flex; gap:8px; }
  .item-links a { font-size:.88em; padding:.4em .9em; border-radius:6px; text-decoration:none; font-weight:600; }
  .item-links a.preview { background:#eef3f7; color:#1a5276; }
  .item-links a.download { background:#1a5276; color:#fff; }
  .item-error-msg { margin-top:8px; font-size:.85em; color:#a02a20; }
  .item iframe { width:100%; height:520px; border:1px solid #ddd; border-radius:6px; margin-top:10px; display:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>논문 분석기</h1>
  <p class="desc">PDF 논문을 업로드하면 상단에 제목·저자·연도·문서유형을 정리하고, 연구대상·연구질문과 가설·연구 데이터·연구방법론·주요결과 및 시사점 5개 항목을 개조식으로 추출해 A4 1장 결과물을 만들어 드립니다. 여러 개를 한 번에 올리면 순서대로 처리하고, 결과는 논문별로 따로 생성됩니다.</p>

  <div id="drop">
    <p>PDF 파일을 여기에 드래그하거나 클릭해서 선택하세요</p>
    <p class="sub">여러 파일을 한 번에 선택할 수 있습니다</p>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
  </div>

  <div id="errorBox"></div>

  <div id="queue"></div>
</div>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const errorBox = document.getElementById('errorBox');
const queueEl = document.getElementById('queue');

let seq = 0;
const pending = [];
let running = false;

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('hover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('hover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('hover');
  if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) addFiles(fileInput.files);
  fileInput.value = '';
});

function addFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!files.length) {
    showError('PDF 파일만 업로드할 수 있습니다.');
    return;
  }
  errorBox.style.display = 'none';
  for (const file of files) {
    const id = 'item-' + (seq++);
    renderItem(id, file.name);
    pending.push({ id, file });
  }
  runQueue();
}

function renderItem(id, name) {
  const row = document.createElement('div');
  row.className = 'item';
  row.id = id;
  row.innerHTML =
    '<div class="item-head">' +
      '<div class="item-name">' + escapeHtml(name) + '</div>' +
      '<div class="item-badge waiting">대기 중</div>' +
    '</div>' +
    '<div class="item-body"></div>';
  queueEl.prepend(row);
}

async function runQueue() {
  if (running) return;
  running = true;
  while (pending.length) {
    const { id, file } = pending.shift();
    await processItem(id, file);
  }
  running = false;
}

async function processItem(id, file) {
  const row = document.getElementById(id);
  const badge = row.querySelector('.item-badge');
  const body = row.querySelector('.item-body');
  badge.textContent = '분석 중...';
  badge.className = 'item-badge processing';

  const formData = new FormData();
  formData.append('pdf', file);

  try {
    const res = await fetch('/analyze', { method: 'POST', body: formData });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || '분석에 실패했습니다.');

    badge.textContent = '완료';
    badge.className = 'item-badge done';
    body.innerHTML =
      '<div class="item-links">' +
        '<a class="preview" href="/results/' + encodeURIComponent(json.result) + '" target="_blank">미리보기</a>' +
        '<a class="download" href="/download/' + encodeURIComponent(json.docx) + '" download>Word로 다운로드</a>' +
      '</div>' +
      '<iframe src="/results/' + encodeURIComponent(json.result) + '"></iframe>';
    body.querySelector('iframe').style.display = 'block';
  } catch (err) {
    badge.textContent = '실패';
    badge.className = 'item-badge error';
    body.innerHTML = '<div class="item-error-msg">' + escapeHtml(err.message) + '</div>';
  }
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
